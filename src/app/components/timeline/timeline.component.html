<div class="flex flex-col gap-3">
    <!-- Progress bar -->
    <div
        class="relative w-full h-2.5 rounded-full overflow-hidden"
        role="progressbar"
        [attr.aria-valuenow]="currentProgress"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Daily timeline progress"
        [ngClass]="backgroundClass"
    >
        <div
            class="absolute top-0 left-0 h-full rounded-full transition-all duration-700 ease-in-out"
            [ngClass]="progressColorClass"
            [style.width.%]="currentProgress"
        ></div>
    </div>

    <!-- Labels -->
    <div class="flex items-center justify-between" [ngClass]="textClass">
        <span class="text-xs opacity-60">{{ formatHour(startHour) }}</span>
        <span class="text-xs font-medium font-cute">{{ currentProgress | number: '1.0-0' }}%</span>
        <span class="text-xs opacity-60">{{ formatHour(endHour) }}</span>
    </div>
</div>
