<div
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="task-modal-heading"
    cdkTrapFocus
>
    <div
        class="max-w-md w-full rounded-3xl p-6 shadow-2xl relative outline-none border-t-4"
        [ngClass]="[theme.modalBackgroundClass, theme.textClass]"
        [style.border-top-color]="theme.ringColor"
        tabindex="-1"
    >
        <!-- Close Button -->
        <button
            (click)="close.emit()"
            title="Close"
            aria-label="Close task list"
            class="absolute top-4 right-4 text-lg transition-colors p-2 rounded-full hover:bg-black/5"
            [ngClass]="theme.iconButtonClass"
        >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>

        <!-- Modal Header -->
        <div class="space-y-4 font-cute">
            <h2 id="task-modal-heading" class="text-xs font-medium uppercase tracking-[0.15em] text-center">
                Tasks
            </h2>

            <!-- New Task Input -->
            <div class="flex gap-0 overflow-hidden rounded-xl border border-black/10">
                <input
                    type="text"
                    [(ngModel)]="newTaskLabel"
                    (keydown.enter)="addTask()"
                    placeholder="Add a task..."
                    class="flex-1 px-4 py-2.5 border-none focus:outline-none text-sm"
                    [ngClass]="[theme.textClass, theme.selectBackgroundClass]"
                />
                <button
                    (click)="addTask()"
                    class="px-4 py-2.5 text-sm font-cute font-medium transition border-l border-black/10"
                    [ngClass]="[theme.selectBackgroundClass, theme.textClass]"
                >
                    Add
                </button>
            </div>

            <!-- Task Progress or Prompt -->
            @if (tasks.length > 0) {
            <div>
                <div class="w-full bg-black/[0.06] rounded-full h-2 overflow-hidden">
                    <div
                        class="h-full rounded-full transition-all duration-500"
                        [ngClass]="theme.progressFillClass"
                        [style.width.%]="taskCompletionPercentage"
                    ></div>
                </div>
                <p class="text-xs font-medium mt-2 opacity-70">{{ taskCompletionLabel }}</p>
            </div>
            } @else {
            <p class="text-sm text-center opacity-60 mt-2">
                Plant your first task
            </p>
            }

            <!-- Task List -->
            <div class="scroll-area text-left space-y-1.5 max-h-[250px] overflow-y-auto mt-2">
                @for (task of tasks; track $index; let i = $index) {
                <div
                    class="flex items-center justify-between gap-2 py-1.5 px-1"
                >
                    <div class="flex items-center gap-2.5">
                        <input
                            type="checkbox"
                            title="Checkbox"
                            [checked]="task.completed"
                            (change)="taskService.toggleCompleted(i)"
                            id="task-{{ i }}"
                            class="h-3.5 w-3.5 rounded accent-current"
                            [ngClass]="[theme.textClass, theme.focusRingClass]"
                        />
                        <label
                            [for]="'task-' + i"
                            [class.line-through]="task.completed"
                            [class.opacity-50]="task.completed"
                            class="cursor-pointer text-sm"
                        >
                            {{ task.label }}
                        </label>
                    </div>
                    <button
                        (click)="taskService.removeTask(i)"
                        aria-label="Remove task"
                        class="text-sm transition-colors p-1 rounded hover:bg-black/5 opacity-40 hover:opacity-100"
                        [ngClass]="theme.iconButtonClass"
                    >
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                }
            </div>
        </div>
    </div>
</div>
