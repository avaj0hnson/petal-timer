<div
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 sm:p-6"
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-heading"
    cdkTrapFocus
>
    <div
        class="rounded-3xl shadow-2xl p-6 w-full max-w-sm relative overflow-y-auto max-h-full border-t-4"
        [ngClass]="[currentTheme.modalBackgroundClass, currentTheme.textClass, currentTheme.buttonClass.split(' ')[0]]"
        [style.border-top-color]="currentTheme.ringColor"
        tabindex="-1"
    >
        <!-- Close Button -->
        <button
            (click)="close.emit()"
            title="Close"
            aria-label="Close settings"
            class="absolute top-4 right-4 text-lg transition-colors p-2 rounded-full hover:bg-black/5"
            [ngClass]="currentTheme.iconButtonClass"
        >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>

        <!-- Modal Heading -->
        <h2
            id="settings-heading"
            class="text-xs font-medium uppercase tracking-[0.15em] font-cute text-center mb-6"
            [ngClass]="currentTheme.textClass"
        >
            Settings
        </h2>

        <!-- Settings Form -->
        <div class="flex flex-col gap-5">
            <!-- Theme Selector -->
            <div class="flex flex-col gap-1.5">
                <label for="themeSelect" class="text-xs font-medium uppercase tracking-wider opacity-70">Theme</label>
                <select
                    id="themeSelect"
                    [(ngModel)]="selectedThemeName"
                    (ngModelChange)="onThemeChange($event)"
                    class="rounded-xl px-3 py-2.5 border text-sm"
                    [ngClass]="[
                        currentTheme.textClass,
                        currentTheme.selectBackgroundClass,
                        currentTheme.focusRingClass,
                        'border-black/10'
                    ]"
                >
                    <option *ngFor="let theme of themes" [value]="theme.name">{{ theme.name }}</option>
                </select>
            </div>

            <!-- Mute Toggle -->
            <div class="flex items-center gap-2.5">
                <input
                    type="checkbox"
                    id="muteToggle"
                    [(ngModel)]="muted"
                    (ngModelChange)="mutedChange.emit($event)"
                    class="form-checkbox h-4 w-4 rounded"
                    [ngClass]="[currentTheme.textClass, currentTheme.focusRingClass]"
                />
                <label for="muteToggle" class="text-sm">Mute sounds</label>
            </div>

            <!-- Work Duration -->
            <div class="flex flex-col gap-1.5">
                <div class="flex items-center justify-between">
                    <label for="workDuration" class="text-xs font-medium uppercase tracking-wider opacity-70">Focus</label>
                    <span class="text-xs font-cute font-medium px-2 py-0.5 rounded-full bg-black/5">{{ workDuration }}m</span>
                </div>
                <input
                    type="range"
                    id="workDuration"
                    [(ngModel)]="workDuration"
                    (ngModelChange)="workDurationChange.emit($event)"
                    min="5" max="180" step="5"
                    class="w-full accent-current"
                />
            </div>

            <!-- Short Break -->
            <div class="flex flex-col gap-1.5">
                <div class="flex items-center justify-between">
                    <label for="shortBreakDuration" class="text-xs font-medium uppercase tracking-wider opacity-70">Short break</label>
                    <span class="text-xs font-cute font-medium px-2 py-0.5 rounded-full bg-black/5">{{ shortBreakDuration }}m</span>
                </div>
                <input
                    type="range"
                    id="shortBreakDuration"
                    [(ngModel)]="shortBreakDuration"
                    (ngModelChange)="shortBreakDurationChange.emit($event)"
                    min="1" max="30" step="1"
                    class="w-full accent-current"
                />
            </div>

            <!-- Long Break -->
            <div class="flex flex-col gap-1.5">
                <div class="flex items-center justify-between">
                    <label for="longBreakDuration" class="text-xs font-medium uppercase tracking-wider opacity-70">Long break</label>
                    <span class="text-xs font-cute font-medium px-2 py-0.5 rounded-full bg-black/5">{{ longBreakDuration }}m</span>
                </div>
                <input
                    type="range"
                    id="longBreakDuration"
                    [(ngModel)]="longBreakDuration"
                    (ngModelChange)="longBreakDurationChange.emit($event)"
                    min="5" max="60" step="5"
                    class="w-full accent-current"
                />
            </div>

            <!-- Start Time -->
            <div class="flex flex-col gap-1.5">
                <label for="startHourSelect" class="text-xs font-medium uppercase tracking-wider opacity-70">Start time</label>
                <select
                    id="startHourSelect"
                    [(ngModel)]="startHour"
                    (ngModelChange)="startHourChange.emit($event)"
                    class="rounded-xl px-3 py-2.5 border text-sm"
                    [ngClass]="[
                        currentTheme.textClass,
                        currentTheme.selectBackgroundClass,
                        currentTheme.focusRingClass,
                        'border-black/10'
                    ]"
                >
                    <option *ngFor="let hour of validStartHours" [value]="hour">{{ formatHour(hour) }}</option>
                </select>
            </div>

            <!-- End Time -->
            <div class="flex flex-col gap-1.5">
                <label for="endHourSelect" class="text-xs font-medium uppercase tracking-wider opacity-70">End time</label>
                <select
                    id="endHourSelect"
                    [(ngModel)]="endHour"
                    (ngModelChange)="endHourChange.emit($event)"
                    class="rounded-xl px-3 py-2.5 border text-sm"
                    [ngClass]="[
                        currentTheme.textClass,
                        currentTheme.selectBackgroundClass,
                        currentTheme.focusRingClass,
                        'border-black/10'
                    ]"
                >
                    <option *ngFor="let hour of validEndHours" [value]="hour">{{ formatHour(hour) }}</option>
                </select>
            </div>
        </div>
    </div>
</div>
