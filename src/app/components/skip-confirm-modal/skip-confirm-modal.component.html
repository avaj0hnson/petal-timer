<div
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="skip-confirm-heading"
    cdkTrapFocus
>
    <div
        class="max-w-sm w-full rounded-3xl p-6 shadow-2xl relative outline-none"
        tabindex="-1"
        [ngClass]="theme.modalBackgroundClass"
    >
        <div [ngClass]="theme.textClass" class="space-y-4 font-cute text-center">
            <h2 id="skip-confirm-heading" class="text-xs font-medium uppercase tracking-[0.15em]">Skip Session?</h2>
            <p class="text-sm leading-relaxed">You won't earn a badge for this session.</p>
            <div class="flex justify-center gap-3 pt-2">
                <button
                    (click)="cancelSkip.emit()"
                    class="px-5 py-2 rounded-full font-cute text-sm shadow-sm hover:shadow-md transition text-white"
                    [ngClass]="[theme.buttonClass, theme.focusRingClass]"
                >
                    Cancel
                </button>
                <button
                    (click)="confirmSkip.emit()"
                    class="px-5 py-2 rounded-full font-cute text-sm shadow-sm hover:shadow-md transition text-white"
                    [ngClass]="[theme.buttonClass, theme.focusRingClass]"
                >
                    Yes, Skip
                </button>
            </div>
        </div>
    </div>
</div>
