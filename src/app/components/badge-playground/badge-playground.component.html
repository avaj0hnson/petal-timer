<div role="list" aria-label="Earned badges">
    <!-- Badge grid -->
    <div class="grid grid-cols-7 gap-3 justify-items-center">
        <!-- Earned badges -->
        @for (badge of activeBadges; track badge.name) {
        <div
            role="listitem"
            class="badge-earned text-3xl transition-transform duration-300 ease-out hover:scale-110 cursor-default"
            [ngClass]="textClass"
            [attr.aria-label]="badge.name || 'Badge'"
            [attr.title]="badge.name || 'Badge'"
        >
            <span aria-hidden="true">{{ badge.emoji }}</span>
        </div>
        }

        <!-- Locked placeholder petals -->
        @for (slot of placeholderSlots; track $index) {
        <div
            role="listitem"
            aria-label="Locked badge"
            class="flex items-center justify-center"
        >
            <svg
                class="w-6 h-6 opacity-[0.12]"
                viewBox="0 0 24 24"
                fill="currentColor"
                [ngClass]="textClass"
                aria-hidden="true"
            >
                <path d="M12 2C12 2 9 6 9 9.5C9 11.5 10.3 13 12 13C13.7 13 15 11.5 15 9.5C15 6 12 2 12 2Z"/>
                <path d="M12 13C12 13 9 15.5 9 18C9 20 10.3 22 12 22C13.7 22 15 20 15 18C15 15.5 12 13 12 13Z" opacity="0.7"/>
            </svg>
        </div>
        }
    </div>

    <!-- Completion message -->
    @if (allBadgesUnlocked) {
    <div class="flex items-center justify-center gap-2 mt-4">
        <span [ngClass]="textClass" class="text-sm font-cute font-medium">
            Garden complete!
        </span>
        <button
            (click)="restartBadges()"
            aria-label="Restart badges"
            title="Restart"
            [ngClass]="textClass"
            class="text-sm p-1 rounded-full hover:rotate-180 transition-transform duration-300"
        >
            <i class="fa-solid fa-rotate-right"></i>
        </button>
    </div>
    }
</div>
